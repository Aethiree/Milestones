<script>
// Persistence shim: same API the app expects, backed by this device's localStorage
window.storage = {
  async get(k){ var v = localStorage.getItem("bm:"+k); if(v===null) throw new Error("key not found"); return {key:k, value:v}; },
  async set(k,v){ localStorage.setItem("bm:"+k, v); return {key:k, value:v}; },
  async delete(k){ localStorage.removeItem("bm:"+k); return {key:k, deleted:true}; },
  async list(p){ var keys=[]; for(var i=0;i<localStorage.length;i++){var key=localStorage.key(i); if(key.indexOf("bm:")===0){var s=key.slice(3); if(!p||s.indexOf(p)===0) keys.push(s);}} return {keys:keys}; }
};
</script>

 2 2h3Z"/><path d="M21 15v7"/>'),dm=re('<path d="M7 16.3c2.2 0 4-1.8 4-4 0-1.5-1.3-3.7-4-6.3-2.7 2.6-4 4.8-4 6.3 0 2.2 1.8 4 4 4Z"/><path d="M12.6 6.6C14 5 15.5 3.7 15.5 3.7s3.5 3.9 3.5 6.3a3.5 3.5 0 0 1-7 0"/>');var f=Ct(Ha()),uu=new Date(2026,5,16,10,33,0),zn=52,Fo=[{week:1,month:1,title:"Hello, world",physical:"Curled-up newborn posture, jerky arm and leg movements, and strong reflexes: rooting, sucking, grasping, and the startle (Moro) reflex. He may lose up to 7-10% of birth weight before regaining it.",senses:"Vision is blurry and focused at 20-30 cm \u2014 roughly the distance to your face during a feed. He prefers high-contrast patterns and already knows the sound of your voices from the womb.",mind:"The brain is forming over a million new neural connections per second. Right now, learning is all sensory: smell, warmth, voice, and touch.",feelings:"Crying is his only language. Skin-to-skin contact regulates his heart rate, temperature, and stress hormones \u2014 for both of you.",care:"Feed on demand (8-12 times per day), sleep him on his back, and keep the umbilical stump clean and dry.",milestones:["Turns toward a touch on the cheek (rooting)","Grips a finger placed in his palm","Calms with skin-to-skin contact","Startles at loud sounds"]},{week:2,month:1,title:"Finding a rhythm",physical:"He should be back to birth weight around now. Movements are still reflex-driven; his neck muscles can lift his head only briefly during supervised tummy time.",senses:"He studies faces at close range and may hold your gaze for a few seconds. Black-and-white or bold patterns hold attention longest.",mind:"He is starting to associate patterns: your smell plus your voice plus milk equals safety. Recognition of primary caregivers is already forming.",feelings:"Expect cluster feeding and a possible growth spurt this week \u2014 fussier evenings are normal, not a sign anything is wrong.",care:"Start 2-3 short tummy-time sessions daily while he is awake and supervised. Day-night confusion is normal; keep nights dark and boring.",milestones:["Regains birth weight","Briefly lifts head during tummy time","Focuses on a face 20-30 cm away","Recognizes parents' voices"]},{week:3,month:1,title:"Locking eyes",physical:"Slightly stronger neck control \u2014 head lifts for a second or two on the tummy. Hands stay mostly fisted, and movements remain jerky.",senses:"He can briefly follow a slowly moving face or high-contrast toy with his eyes. Hearing is sharp; he may quiet when he hears you approach.",mind:"Alert periods are stretching a little longer. He is beginning to anticipate: crying may pause when he hears feeding preparations.",feelings:"Crying typically increases from here, peaking around week 6 \u2014 this is the normal 'PURPLE crying' curve, not a reflection of your parenting.",care:"Watch his cues: gazing at you means 'more', turning away means 'I need a break'. Short interactions, then rest.",milestones:["Follows a face briefly with his eyes","Quiets to a familiar voice","Stays alert for slightly longer stretches","Head lifts 1-2 seconds in tummy time"]},{week:4,month:1,title:"One month strong",physical:"Lifts his head about 45 degrees briefly during tummy time and may turn it side to side. Jerkiness is smoothing out slightly.",senses:"Tracks objects moving in an arc in front of him. He strongly prefers human faces over any toy.",mind:"First deliberate-looking behaviors appear: he works to keep something interesting in view. Throaty gurgles begin alongside crying.",feelings:"You may catch fleeting proto-smiles. He settles best with familiar routines: same songs, same holds, same rhythm.",care:"The one-month checkup usually lands around now \u2014 bring your questions list. Track wet diapers (6+ per day) as the feeding gauge.",milestones:["Lifts head ~45\xB0 in tummy time","Tracks a moving object briefly","Makes sounds other than crying","Looks at your face intently"]},{week:5,month:2,title:"First conversations",physical:"Neck strength keeps building; head control while held upright is steadier, though still needing support. Leg kicks are getting vigorous.",senses:"Vision now stretches a bit farther, and he is drawn to slightly more complex patterns. He turns toward interesting sounds.",mind:"Cooing begins in earnest \u2014 vowel sounds like 'ooh' and 'aah'. Pause after you talk to him; he is learning conversational turn-taking.",feelings:"He is on the verge of the social smile. Face-to-face time is the most powerful developmental input there is right now.",care:"Crying is approaching its lifetime peak. It is always okay to put him down somewhere safe and take a breather.",milestones:["Coos with vowel sounds","Holds head steadier when upright","Turns toward sounds","Enjoys face-to-face interaction"]},{week:6,month:2,title:"The first real smile",physical:"Movements are noticeably smoother. In tummy time he may hold his head up for several seconds at a stretch.",senses:"Color vision is developing \u2014 reds and greens are becoming distinguishable. He watches your mouth move when you speak.",mind:"He connects cause and effect in tiny ways: 'when I cry, someone comes'. Memory for familiar faces is strengthening.",feelings:"The social smile typically arrives around now \u2014 a genuine, eye-crinkling response to you, not gas. Crying also peaks around week 6 before gradually easing.",care:"A growth spurt often hits at 6 weeks: expect a hungrier, clingier baby for a few days.",milestones:["First social smile","Smoother arm and leg movements","Begins to distinguish colors","Watches faces with intense interest"]},{week:7,month:2,title:"Brighter, louder, longer",physical:"He may briefly bear a little weight on his legs when held standing. Hands are starting to unfold from their newborn fists.",senses:"Tracking is smoother \u2014 he can follow a toy through a wider arc. He notices objects farther away, like a ceiling fan or window light.",mind:"Cooing is becoming interactive: he responds when you respond. Alert windows now allow real play sessions.",feelings:"He smiles to start interactions, not just to answer them. Delight is becoming visibly mutual.",care:"Introduce a consistent, simple bedtime wind-down now \u2014 bath, feed, song, crib. It pays off for months.",milestones:["Smiles to initiate interaction","Follows objects through a wide arc","Hands begin to open and relax","Vocalizes back and forth with you"]},{week:8,month:2,title:"Two months in",physical:"Head control at 45 degrees in tummy time is more reliable, and he holds it longer. He may push up slightly on his arms.",senses:"He looks at his own hands with fascination \u2014 a major discovery. Visual attention shifts smoothly between objects and faces.",mind:"CDC two-month markers: calms when spoken to, looks at faces, reacts to loud sounds, and makes sounds other than crying.",feelings:"He shows contentment, distress, and interest distinctly. Being soothed by your voice alone becomes more common.",care:"Two-month checkup and first major round of immunizations. A fussy, sleepy day afterward is normal.",milestones:["Calms down when spoken to or picked up","Looks at your face and smiles responsively","Holds head up in tummy time","Discovers his own hands"]},{week:9,month:3,title:"Hands come online",physical:"He brings his hands to the midline of his body and toward his mouth \u2014 the start of hand coordination. Neck control keeps firming up.",senses:"Depth perception is beginning as his eyes learn to work together. He follows you across the room with his gaze.",mind:"He is learning his body is his: staring at hands, experimenting with moving them. This self-discovery is genuine cognition.",feelings:"Preference for primary caregivers is obvious now \u2014 he may settle for you when others cannot.",care:"Sleep may begin consolidating into longer night stretches. Follow his lead rather than forcing a schedule yet.",milestones:["Brings hands together at midline","Brings hands to mouth","Follows people across the room visually","Longer night sleep stretches may begin"]},{week:10,month:3,title:"Swipes and squeals",physical:"He bats and swipes at dangling toys \u2014 aim is poor but intent is real. Kicking is strong and rhythmic.",senses:"He connects what he sees with what he does, watching his own hand as it reaches. Sounds get localized faster.",mind:"Anticipation grows: he gets visibly excited when he recognizes a feed or bath coming. Early squeals and louder vocal play emerge.",feelings:"He is developing distinct moods across the day and clear ways of showing them. Play earns real enthusiasm.",care:"Rotate a small set of simple toys \u2014 a play gym with dangling objects is ideal for this batting phase.",milestones:["Swipes at dangling objects","Squeals and experiments with volume","Shows excitement when anticipating routines","Strong rhythmic kicking"]},{week:11,month:3,title:"Almost a laugh",physical:"Tummy-time pushups on forearms are emerging, chest starting to lift. Head lag when pulled to sit is decreasing.",senses:"He examines objects visually with real focus, especially new ones. Faces at a distance now register too.",mind:"He varies his cries meaningfully \u2014 hunger, tired, and bored cries sound different, and you can likely tell them apart now.",feelings:"Chuckles and near-laughs slip out during play. He actively works to keep interactions going.",care:"Talk through everything you do together \u2014 narration is the highest-value language input at this age.",milestones:["Pushes up on forearms in tummy time","Chuckles or near-laughs","Distinct cries for distinct needs","Sustained visual examination of objects"]},{week:12,month:3,title:"The first laugh",physical:"He may roll from tummy to side accidentally \u2014 the first hint of rolling. Grip on offered toys is intentional and firmer.",senses:"He turns his head precisely toward voices and sounds. Visual memory shows: he recognizes familiar objects like his bottle.",mind:"He is connecting sequences: bib means food is coming. This chaining of events is early memory and prediction at work.",feelings:"The first genuine belly laugh often lands around now \u2014 one of parenting's great moments. Capture it if you can.",care:"Never leave him unattended on raised surfaces from here on \u2014 rolling can arrive without warning.",milestones:["First real laugh","Holds a toy placed in his hand","May roll tummy to side","Anticipates familiar sequences"]},{week:13,month:3,title:"Three months: the fog lifts",physical:"In tummy time he props steadily on forearms with head at 90 degrees. When held standing, legs push down firmly.",senses:"Hand-eye coordination is visibly clicking \u2014 he sees a toy, reaches, and sometimes connects. Full head tracking of moving people.",mind:"The 'fourth trimester' ends: he is more predictable, more interactive, and awake for genuine play sessions of 60-90 minutes.",feelings:"He has become a social creature \u2014 smiling at himself in mirrors, delighting in siblings, protesting when play stops.",care:"Many babies settle into a loose 3-4 nap rhythm now. His big brother is likely his favorite entertainment \u2014 supervised together-time is gold.",milestones:["Props on forearms, head at 90\xB0","Reaches for toys with improving aim","Smiles at mirror reflections","Awake windows stretch to 60-90 minutes"]},{week:14,month:4,title:"Grab and hold",physical:"Reaching is becoming accurate \u2014 he grabs toys deliberately and brings them straight to his mouth. Rolling front-to-back may debut any day.",senses:"Mouthing is his lab: texture, temperature, and shape all get analyzed orally. This is learning, not just teething.",mind:"He explores cause and effect on purpose: shake the rattle, hear the noise, shake again. Repetition is his experiment.",feelings:"He is more vocal about preferences \u2014 favorite toys, favorite positions, favorite people.",care:"Sweep his reach zone for choking hazards; anything within grabbing distance will be mouthed. The toilet-paper-tube test: if it fits through, it is too small.",milestones:["Grabs and mouths toys deliberately","May roll from tummy to back","Repeats actions to reproduce effects","Shows clear toy preferences"]},{week:15,month:4,title:"Louder and prouder",physical:"Head control is essentially solid when upright. He may 'tripod' briefly when placed sitting with hand support.",senses:"Full color vision has largely arrived, and distance vision keeps sharpening. He spots you entering the room instantly.",mind:"Babbling adds consonant sounds \u2014 'b', 'g', 'm' mixed with vowels. He experiments with pitch, volume, and blowing sounds.",feelings:"He laughs at surprises like gentle peekaboo and mock-gasps. A real sense of humor is emerging.",care:"The 4-month sleep regression may arrive soon as sleep cycles mature \u2014 it is a progression in brain development, even if the nights say otherwise.",milestones:["Steady head control when upright","Consonant sounds enter babbling","Laughs at simple surprises","Recognizes you at a distance"]},{week:16,month:4,title:"Four months: the scientist",physical:"CDC four-month markers: holds head steady without support, holds a toy when you put it in his hand, and uses his arm to swing at toys.",senses:"He watches the path of falling objects and looks for the source of sounds \u2014 building a physics model of the world.",mind:"He 'talks back' when you talk, copies your facial expressions, and turns his head toward your voice reliably.",feelings:"Smiles on his own to get your attention \u2014 social initiative, not just social response.",care:"Four-month checkup and vaccinations. Ask your pediatrician about vitamin D and when to start solids (usually around six months).",milestones:["Holds head steady unsupported","Swings arm at dangling toys","Copies facial expressions","Smiles spontaneously for attention"]},{week:17,month:4,title:"Roll call",physical:"Tummy-to-back rolling is common now, and back-to-tummy is being rehearsed with vigorous side-twisting. Push-ups extend to straighter arms.",senses:"He tracks fast-moving targets \u2014 the big brother sprinting past is prime viewing material.",mind:"Object memory strengthens: he looks toward where a dropped toy went. The idea that things persist is taking root.",feelings:"He may protest \u2014 loudly \u2014 when a toy is removed or play ends. Preferences now come with opinions.",care:"If he can roll, stop swaddling with arms in (if you haven't already) and keep one hand on him during every diaper change.",milestones:["Rolls tummy to back consistently","Pushes chest up on straighter arms","Looks after dropped objects","Protests when play stops"]},{week:18,month:5,title:"Reaching mastery",physical:"Reaching is now smooth and accurate, often with both hands. He grabs his own feet \u2014 a favorite new toy that is always available.",senses:"He explores contrasting textures with hands and mouth: crinkly, smooth, soft, cool. Sensory variety is enrichment.",mind:"He examines toys systematically \u2014 turning, banging, mouthing, dropping \u2014 like running a test suite on every object.",feelings:"He shows genuine attachment behaviors: reaching for you, calming faster with familiar people, lighting up for family.",care:"Offer toys slightly out of reach during tummy time to motivate pivoting and early creeping movements.",milestones:["Reaches accurately with both hands","Finds and grabs his own feet","Examines objects systematically","Reaches out toward familiar people"]},{week:19,month:5,title:"Raspberries and squeals",physical:"Back-to-tummy rolling may land now, completing the rolling set. Some babies start pivoting in circles during tummy time.",senses:"He notices tiny things \u2014 crumbs, threads, patterns \u2014 as visual acuity sharpens dramatically.",mind:"Raspberry-blowing and consonant chains ('ba-ba', 'ga-ga') dominate. He is deliberately practicing the mechanics of speech.",feelings:"Belly laughs are frequent and earned \u2014 he has comedy preferences now (peekaboo, mock sneezes, silly voices).",care:"Babyproofing time is approaching fast. Get ahead of it: outlet covers, anchor furniture, clear floor-level hazards.",milestones:["May roll back to tummy","Blows raspberries","Chains consonant syllables","Laughs at favorite games"]},{week:20,month:5,title:"Sitting practice",physical:"Supported sitting is getting sturdy; he props on his hands in tripod position for longer stretches. Core strength is building daily.",senses:"He looks at objects, then at you, then back \u2014 shared attention, a foundation of communication and learning.",mind:"He responds to his own name inconsistently but increasingly. Familiar words like 'milk' or 'bath' may earn recognition.",feelings:"Stranger awareness begins to flicker: new faces get studied seriously before earning a smile.",care:"Practice sitting with pillows around him. Falls happen \u2014 soft landings make them lessons instead of tears.",milestones:["Sits in tripod position","Begins responding to his name","Shares attention between object and person","Studies unfamiliar faces carefully"]},{week:21,month:5,title:"Opinions, loudly held",physical:"He may lunge from sitting toward toys, or scoot backward accidentally in tummy time \u2014 pre-crawling mechanics assembling themselves.",senses:"Sound discrimination is sharp: he distinguishes tones of voice and reacts differently to happy versus stern speech.",mind:"He anticipates whole routines now: the bath towel means bath, the carrier means going out. Sequences are mapped.",feelings:"Frustration appears when he cannot reach or do something \u2014 a healthy sign of ambition outpacing ability.",care:"Narrate emotions when they happen ('you're frustrated \u2014 that toy is far away'). He understands tone long before words.",milestones:["Lunges toward toys from sitting","Reacts to tone of voice","Anticipates multi-step routines","Shows visible frustration and determination"]},{week:22,month:6,title:"Almost sitting solo",physical:"Brief independent sitting moments arrive \u2014 a few seconds before the wobble. He passes objects from hand to hand.",senses:"He drops things on purpose to watch them fall. Gravity is under formal investigation, and you are the retrieval system.",mind:"Hand-to-hand transfer is a cognitive milestone, not just motor: it requires planning across both sides of the brain.",feelings:"He clearly prefers his people. Big-sibling interactions become genuinely reciprocal \u2014 watching, laughing, imitating.",care:"Start researching first foods. Signs of readiness: sits with minimal support, good head control, interest in your food, lost tongue-thrust reflex.",milestones:["Sits alone for a few seconds","Transfers objects hand to hand","Drops objects to watch them fall","Engages reciprocally with siblings"]},{week:23,month:6,title:"The world in both hands",physical:"Raking grasp develops \u2014 he scoops small objects with his whole hand. Rolling is now a legitimate mode of transportation.",senses:"He explores by banging: everything gets tested against the floor, the table, and other toys for its acoustic properties.",mind:"Object permanence strengthens: partially hidden toys get found. Fully hidden ones still vanish from his universe \u2014 for now.",feelings:"He may begin showing wariness with strangers and extra clinginess with you. This is attachment working correctly.",care:"If a toy is partially hidden under a cloth, he can find it \u2014 make it a game. It is a workout for his memory.",milestones:["Rakes small objects toward himself","Finds partially hidden toys","Rolls as transportation","Shows early stranger wariness"]},{week:24,month:6,title:"Half a year",physical:"CDC six-month markers: rolls tummy to back, pushes up with straight arms, and leans on hands to support himself sitting.",senses:"He recognizes familiar people at a distance and knows immediately when someone new is holding him.",mind:"He takes turns making sounds with you, blows raspberries, and squeals. Receptive language is quietly racing ahead of expressive.",feelings:"He knows familiar people, likes looking at himself in the mirror, and laughs readily \u2014 the CDC's social six-month set.",care:"Six-month checkup, vaccinations, and typically the green light for solids. Iron-rich first foods matter: fortified cereal, pureed meats, lentils.",milestones:["Sits leaning on hands","Takes turns vocalizing","Laughs and squeals readily","Ready to start solid foods"]},{week:25,month:6,title:"First bites",physical:"Sitting stretches longer with less propping. In tummy time he may plank, pivot, or push backward \u2014 crawling prep in full swing.",senses:"Taste and texture exploration begins in earnest with solids. Expect dramatic faces; rejection today means try again next week.",mind:"It can take 10-15 exposures before a new food is accepted \u2014 persistence, not preference, is the variable that matters.",feelings:"Mealtimes are social: he watches how you eat and reacts to your reactions. Eat together when you can.",care:"One new food every few days makes allergen tracking easy. Current guidance says early introduction of peanut and egg (in safe forms) reduces allergy risk \u2014 confirm approach with your pediatrician.",milestones:["Takes first tastes of solid food","Sits with minimal support","Pivots or planks in tummy time","Watches and mimics how you eat"]},{week:26,month:6,title:"Sturdy and social",physical:"Independent sitting is getting reliable \u2014 hands free for play is the unlock. Some babies get up on all fours and rock.",senses:"He looks at the right object when you name a familiar thing \u2014 early proof that words are attaching to the world.",mind:"Babbling takes on conversational rhythm and intonation: it sounds like speech with the words scrambled out.",feelings:"Separation awareness may begin: he notices when you leave and is thrilled when you return.",care:"Play disappearing-reappearing games (peekaboo, hiding toys). They directly exercise the object permanence circuitry.",milestones:["Sits independently and plays","Rocks on hands and knees","Babbling has speech-like rhythm","Notices departures and returns"]},{week:27,month:7,title:"Command of the floor",physical:"Sitting is now his stable home base \u2014 he twists, reaches, and recovers from wobbles. Getting into sitting on his own may follow soon.",senses:"He inspects fine details: tags, labels, textures, and edges get close, focused study.",mind:"He looks for fully hidden objects now \u2014 object permanence is consolidating. Peekaboo becomes genuinely suspenseful.",feelings:"He may reach up to be lifted and cling when tired \u2014 communication through his whole body.",care:"Lower the crib mattress before he surprises you by pulling to stand. It is coming sooner than you think.",milestones:["Sits steadily as a play base","Searches for fully hidden objects","Raises arms to be picked up","Inspects fine details of objects"]},{week:28,month:7,title:"Locomotion loading",physical:"Creeping, scooting, rolling chains, or classic crawling \u2014 some form of intentional travel usually emerges around now. Style varies wildly and all are normal.",senses:"Depth perception is well developed; he judges distances when reaching and may hesitate at edges.",mind:"He uses objects as tools in simple ways \u2014 pulling a blanket to bring the toy sitting on it closer.",feelings:"He is reading your face constantly, checking your reaction before deciding how to feel about something new. This is social referencing.",care:"Get on the floor at his eye level and crawl the house yourself \u2014 you will find hazards the standing view misses.",milestones:["First intentional travel (any style)","Pulls a blanket to retrieve a toy","Checks your face before reacting","Judges distances accurately"]},{week:29,month:7,title:"The babble concert",physical:"Movement is getting faster and more determined. He may combine moves: sit, pivot, lean, creep, sit back up.",senses:"He responds to quiet sounds across the room and locates them instantly \u2014 hearing checks itself daily now.",mind:"Long babble monologues with varied syllables ('ba-da-ga-ma') dominate playtime. He is drilling every sound his mouth can make.",feelings:"Games have favorites now, and he shows clear joy in mastery \u2014 the grin after a successful reach or move is pride, arriving early.",care:"Respond to babble as if it is conversation. Serve-and-return interaction is the single best-evidenced language booster.",milestones:["Long varied babble strings","Combines movements fluidly","Shows pride after accomplishing something","Locates quiet sounds across the room"]},{week:30,month:7,title:"Small hands, big plans",physical:"The raking grasp is refining toward finger-and-thumb precision. He feeds himself large soft pieces with increasing success.",senses:"He compares objects \u2014 one in each hand, looking between them, banging them together. Comparison is analysis.",mind:"He remembers games and people across days now. Routines skipped get noticed; favorite books get recognized.",feelings:"Separation anxiety may be warming up: fussing when you leave the room is a sign his attachment and memory are both working.",care:"Practice brief, narrated separations ('I'll be right back') with cheerful returns. Predictability builds trust faster than avoidance.",milestones:["Self-feeds soft finger foods","Compares two objects at once","Remembers routines across days","Fusses when you leave the room"]},{week:31,month:8,title:"Up on all fours",physical:"Hands-and-knees crawling is common now, or rapidly approaching. Some babies skip it entirely for scooting \u2014 outcome matters, style does not.",senses:"He tracks small fast things (a rolling ball, the sibling, a pet) and plans intercept courses.",mind:"Cause and effect gets sophisticated: buttons that make noise, lids that open, switches that do things. He seeks out mechanisms.",feelings:"Stranger anxiety often peaks in this stretch \u2014 clinging and crying with new people is developmentally right on schedule.",care:"Give visitors a slow on-ramp: let him observe from your arms first. Forced handoffs backfire.",milestones:["Crawls or scoots with purpose","Operates simple mechanisms","Chases moving targets","Wary of strangers, secure with you"]},{week:32,month:8,title:"Pulling up",physical:"Pulling to kneeling or standing against furniture begins. Expect falls \u2014 landing on a padded bottom is part of the curriculum.",senses:"He explores vertical space now: what is on the couch, the table edge, the shelf. Every surface at new heights needs a sweep.",mind:"He may respond to his own name reliably and pause at 'no' \u2014 comprehension of a handful of words is real now.",feelings:"He wants you within sight while he explores \u2014 orbiting you like a home base, venturing and returning.",care:"Move anything grabbable from table edges: tablecloths, cords, hot drinks. His reach zone just grew a foot taller.",milestones:["Pulls to kneel or stand","Responds to his name consistently","Pauses at the word 'no'","Uses you as a secure base"]},{week:33,month:8,title:"Ma-ma, da-da",physical:"Standing at furniture stretches longer, weight shifting side to side. Getting down gracefully has not been installed yet.",senses:"He hunts dropped and thrown objects visually, tracking full trajectories \u2014 physics research continues.",mind:"'Mama' and 'dada' appear in babble, nonspecifically at first. Specific use usually follows within weeks \u2014 both count as milestones.",feelings:"He shows affection deliberately: leaning in, patting, face-grabbing (his version of a hug). Warmth flows both ways now.",care:"Teach 'down' by physically guiding his knees to bend when he is stuck standing \u2014 he will learn the move fast.",milestones:["Says 'mama' or 'dada' (nonspecific)","Stands at furniture, shifting weight","Shows deliberate affection","Tracks full trajectories of thrown objects"]},{week:34,month:8,title:"The little engineer",physical:"Cruising sideways along furniture may begin \u2014 first steps' direct ancestor. Crawling speed becomes genuinely impressive.",senses:"He studies how things fit: putting objects in containers, taking them out, and repeating it dozens of times.",mind:"Container play is spatial reasoning under construction. Banging two blocks together \u2014 a CDC 9-month marker \u2014 arrives around now.",feelings:"He looks to you when uncertain and borrows your confidence. Your calm face is his risk assessment.",care:"Offer nesting cups, boxes, and safe containers. The cheapest toys are doing the most sophisticated teaching right now.",milestones:["Cruises along furniture","Bangs two objects together","Puts objects into containers","Borrows confidence from your reactions"]},{week:35,month:8,title:"The pincer preview",physical:"Thumb-and-forefinger precision is emerging \u2014 small foods get picked up with increasingly surgical technique.",senses:"Tiny objects on the floor are now visible to him and irresistible. Vacuum often; he sees everything.",mind:"He imitates actions he watched earlier \u2014 clapping, banging, waving attempts. Delayed imitation means memory plus motor planning.",feelings:"Games with rules delight him: pat-a-cake, peekaboo variations, give-and-take exchanges. Turn-taking is social structure forming.",care:"Practice give-and-take: hand him things, ask for them back, celebrate the exchange. Sharing starts as a game.",milestones:["Emerging pincer grasp","Imitates observed actions later","Plays give-and-take games","Attempts to wave"]},{week:36,month:9,title:"Nine months out",physical:"CDC nine-month markers: gets to sitting by himself and sits without support. Many babies also pull to stand routinely now.",senses:"He looks for objects when they drop out of sight \u2014 the CDC's formal object-permanence marker, likely old news to him by now.",mind:"He may lift arms to be picked up, look when you call his name, and show several distinct facial expressions on purpose.",feelings:"The nine-month social set: shy or fearful with strangers, reactive to your departures, joyful at reunions, engaged in peekaboo.",care:"Nine-month checkup often includes a formal developmental screening \u2014 a great moment to raise any observations or questions.",milestones:["Gets into sitting position alone","Looks for dropped objects","Lifts arms to be picked up","Smiles or laughs at peekaboo"]},{week:37,month:9,title:"Waves and words",physical:"Standing balance improves; he may let go of support for a breathless second. Cruising gets faster and more confident.",senses:"He follows your point \u2014 looking where you indicate, not at your finger. Joint attention like this is a major communication milestone.",mind:"Waving bye-bye becomes intentional. Gestures are words before words: each one is vocabulary.",feelings:"He expresses preferences emphatically \u2014 arching, reaching, head-turning. 'No' is being communicated long before it is said.",care:"Pair gestures with words consistently ('bye-bye!' while waving). Gesture-word pairing measurably accelerates first words.",milestones:["Waves bye-bye intentionally","Follows your point","Brief unsupported standing","Communicates refusal clearly"]},{week:38,month:9,title:"The understanding gap",physical:"He may climb \u2014 stairs, cushions, you. Climbing is irresistible and excellent development; supervise and let it happen safely.",senses:"He recognizes objects by partial views and by feel \u2014 grabbing the right toy from the bin without looking.",mind:"Receptive vocabulary may hit dozens of words while he speaks none. Comprehension always runs months ahead of speech.",feelings:"He checks in visually during independent play, touching base across the room with a look and a smile.",care:"Install stair gates now if you have not. Give him one safe climbing outlet \u2014 cushions on the floor work perfectly.",milestones:["Climbs low obstacles","Understands many familiar words","Recognizes objects by touch","Visual check-ins during play"]},{week:39,month:9,title:"Almost cruising fast",physical:"Cruising may bridge gaps \u2014 letting go of the couch to lunge for the table. Squatting down from standing gets smoother.",senses:"He notices small differences: a new toy in the bin, a moved piece of furniture, a haircut. Novelty detection is sharp.",mind:"He solves simple detour problems \u2014 going around an obstacle to reach a goal instead of just reaching through it.",feelings:"Frustration tolerance is being built rep by rep. Letting him struggle briefly before helping is a gift, not neglect.",care:"Offer help in stages: wait, then encourage, then hint, then assist. The struggle is where the learning lives.",milestones:["Bridges gaps while cruising","Solves simple detour problems","Notices environmental changes","Persists briefly through frustration"]},{week:40,month:10,title:"Double digits",physical:"Standing without support for seconds at a time. The pincer grasp is precise \u2014 small foods, small objects, small everything.",senses:"He explores object properties systematically: soft things squeeze, hard things bang, paper tears. Material science, hands-on.",mind:"He may point at things he wants or finds interesting. Pointing is a profound cognitive act: directing another mind's attention.",feelings:"He initiates games with you now \u2014 starting peekaboo himself, offering toys to begin an exchange.",care:"When he points, name what he points at. Every point is a vocabulary request \u2014 answer them all.",milestones:["Stands alone for a few seconds","Precise pincer grasp","Points at interesting things","Initiates familiar games"]},{week:41,month:10,title:"The imitation engine",physical:"He may stand up from the floor without pulling on anything \u2014 a squat-to-stand power move. Cruising is nearly hands-free.",senses:"He watches how you use everyday objects and copies: phone to ear, cup to lips, brush to hair.",mind:"Functional imitation \u2014 using objects for their real purpose \u2014 shows he is mapping the human world, not just the physical one.",feelings:"He responds to your emotions with matching ones: your laugh triggers his, your 'ouch' brings concern to his face.",care:"Give him real-ish tools: a play phone, a spoon, a cup. Imitation of daily life is his favorite curriculum now.",milestones:["Stands up without support","Uses objects functionally (cup to lips)","Mirrors your emotional expressions","Copies everyday actions"]},{week:42,month:10,title:"First words warming up",physical:"A few babies take first steps around now; most are weeks away. Bear-walking, knee-walking, and speed-cruising are all normal precursors.",senses:"He listens to conversations and looks at whoever is speaking, tracking dialogue like a spectator sport.",mind:"Word-like sounds attach to meanings: 'ba' for ball, 'da' for dog. Consistent sound-plus-meaning counts as a word, however imperfect.",feelings:"He shows off \u2014 repeating actions that earned laughs. An audience makes everything more fun.",care:"Keep a notes file of his 'words' and what they mean. It becomes a treasured record, and it is useful at checkups.",milestones:["Word-like sounds with meaning","Watches conversations attentively","Repeats crowd-pleasing actions","May take first independent steps"]},{week:43,month:10,title:"Little problem solver",physical:"He climbs onto low furniture and \u2014 critically \u2014 is learning to get down feet-first. Backing down is teachable; guide his legs a few times.",senses:"He anticipates sensory outcomes: braces for the cold wipe, opens mouth at spoon-sight, giggles before the tickle lands.",mind:"He uses trial and error deliberately \u2014 trying multiple approaches when the first fails. Persistence plus flexibility equals problem solving.",feelings:"Attachment shows nuance: different greetings for parents, grandparents, and strangers. His social map has layers.",care:"Childproof one cabinet with safe items and let him raid it. Sanctioned mischief spares the rest of the kitchen.",milestones:["Climbs on and off low furniture","Tries multiple approaches to problems","Anticipates familiar sensations","Greets different people differently"]},{week:44,month:11,title:"Eleven months: the cusp",physical:"Standing is confident; steps may happen holding one hand. Balance recoveries \u2014 the wobble-and-catch \u2014 improve daily.",senses:"He fine-tunes force: gentle pats for the dog (with coaching), soft touches for faces, hard bangs for drums.",mind:"He follows simple one-step directions paired with gestures: 'give me the ball', 'come here', 'wave bye-bye'.",feelings:"He may test reactions deliberately \u2014 reaching for the forbidden thing while watching you. This is hypothesis testing, not defiance.",care:"Respond to tests with calm consistency. The experiment he is running is 'are the rules stable?' \u2014 let the data be boring.",milestones:["Walks holding one hand","Follows gesture-paired directions","Modulates touch strength","Tests boundaries while watching you"]},{week:45,month:11,title:"The toddler preview",physical:"Independent steps often arrive in this window \u2014 typically 2-5 wobbly ones between supports. The normal range for walking is huge: 9 to 18 months.",senses:"He loves music with movement: bouncing, swaying, and arm-pumping to rhythm. Dancing predates walking for many babies.",mind:"He may say 1-2 real words beyond mama/dada, and understands simple questions like 'where's your cup?'",feelings:"Pride is unmistakable now \u2014 the look-at-me glance after every achievement. Celebrate it; motivation compounds.",care:"Barefoot is best for learning to walk indoors \u2014 feet grip and balance better without shoes.",milestones:["First independent steps may arrive","Says 1-2 words besides mama/dada","Dances to music","Seeks your reaction after achievements"]},{week:46,month:11,title:"Words and wheels",physical:"Steps chain together if walking has started; if not, cruising is lightning-fast and one-hand-supported walking is smooth.",senses:"He turns book pages (several at a time), pats pictures, and may point at named images \u2014 early literacy in motion.",mind:"He grasps 'in', 'out', 'up', 'down' as concepts, demonstrated by following simple spatial requests.",feelings:"Comfort objects may emerge \u2014 a blanket or soft toy that helps him self-soothe. This is a healthy independence tool.",care:"Read the same books repeatedly on request. Repetition is not boring to him; it is how mastery feels.",milestones:["Engages actively with books","Understands simple spatial words","May adopt a comfort object","Walks with less support"]},{week:47,month:11,title:"The gesture vocabulary",physical:"Squatting to pick things up while standing \u2014 a serious balance feat \u2014 starts happening. Stair-climbing (up) is fast; down still needs teaching.",senses:"He listens for meaning in your sentences, catching familiar words inside the stream of speech.",mind:"Gesture vocabulary explodes: pointing, waving, arms-up, head-shaking, hand-out-for-more. He can hold basic conversations wordlessly.",feelings:"Empathy sprouts: he may offer his snack to someone, or pat a crying person. Kindness begins as imitation and becomes real.",care:"Consider a few simple signs (more, all done, milk) if you like \u2014 they reduce frustration and do not delay speech.",milestones:["Rich gesture communication","Squats and recovers while standing","Shows early empathy behaviors","Picks familiar words out of sentences"]},{week:48,month:11,title:"Countdown to one",physical:"Whether walking or power-crawling, he moves with intent and speed. Fine motor: stacking two blocks may succeed after many attempts.",senses:"He recognizes routines by sensory cues alone \u2014 the bath running, keys jingling, the dinner smell.",mind:"Memory stretch is real: he remembers where things are kept and goes to get them \u2014 including things you hid.",feelings:"Separation anxiety often surges again near the first birthday. It passes; warm consistent goodbyes help it pass faster.",care:"Start planning the 12-month checkup questions. Also: cake smash logistics are a legitimate agenda item.",milestones:["Moves with speed and intent","Remembers object locations","May stack two blocks","Renewed clinginess (normal wave)"]},{week:49,month:12,title:"The home stretch",physical:"Walking, if arrived, gets steadier daily \u2014 wider stance, arms up for balance, adorable robot gait. If not yet, entirely normal.",senses:"He explores with tools now: poking with sticks, scooping with spoons, stirring with anything stir-capable.",mind:"CDC twelve-month markers approaching: waves bye-bye, calls a parent 'mama'/'dada' specifically, understands 'no', looks for hidden things.",feelings:"He plays games with you like pat-a-cake fluently, and his personality \u2014 cautious or bold, silly or serious \u2014 is unmistakably his.",care:"Review the 12-month vaccine schedule ahead of the appointment (MMR, varicella, hep A typically start now).",milestones:["Says mama/dada specifically","Understands 'no' (pauses briefly)","Plays pat-a-cake style games","Distinct personality traits visible"]},{week:50,month:12,title:"Little communicator",physical:"He drinks from an open or straw cup with help \u2014 the AAP recommends starting to wean off bottles from 12 months.",senses:"He looks at the right picture when you name it in books, connecting 2D images to real-world things.",mind:"He may have 1-3 words used correctly, plus a dozen gestures and hundreds of understood words \u2014 an iceberg of language.",feelings:"He hands you things to start interactions \u2014 a book means 'read to me', a toy means 'play with me'. Invitations, constantly.",care:"Accept every invitation you reasonably can this month. Handing-you-things season is short and precious.",milestones:["Uses 1-3 words correctly","Drinks from a cup with help","Hands you objects to engage","Matches words to pictures"]},{week:51,month:12,title:"Practically one",physical:"He may stand up in the middle of the room without support \u2014 no furniture needed. Ball play begins: rolling and flinging.",senses:"He tunes in to other children with fascination, watching and paralleling their play \u2014 his brother is the world's best show.",mind:"He searches correctly when things are hidden in new places \u2014 flexible object permanence, fully installed.",feelings:"He checks your reaction to strangers and new situations before committing to his own \u2014 trust operating in real time.",care:"Take the one-year photos and write him a short letter. Future-you will be very glad present-you did.",milestones:["Stands from the middle of the floor","Rolls or flings a ball","Flexible searching for hidden objects","Watches other children intently"]},{week:52,month:12,title:"One year old",physical:"From reflexes to (nearly) walking, from 8-inch vision to cross-room recognition, from 3-4 kg to roughly triple his birth weight. A year of staggering growth.",senses:"All senses now integrate: he sees, hears, touches, and moves as one coordinated system exploring everything.",mind:"One year of the fastest brain growth in human life \u2014 the brain has roughly doubled in size and built trillions of connections.",feelings:"He loves specifically, communicates constantly, jokes deliberately, and trusts completely. The newborn is now a person you know.",care:"Happy first birthday! Twelve-month checkup, first vaccines round, and \u2014 whenever you are all ready \u2014 the switch to whole milk and family foods.",milestones:["Happy 1st birthday!","Roughly triples birth weight","Communicates with words and gestures","A full year of milestones behind him"]}],vp=[{month:1,name:"The Fourth Trimester",range:"Weeks 1-4",flags:["Doesn't respond to loud sounds","Doesn't focus on faces at close range by 3-4 weeks","Feeds poorly or has fewer than 6 wet diapers a day","Fever of 38\xB0C / 100.4\xB0F or higher (seek care immediately under 3 months)"]},{month:2,name:"Waking Up to the World",range:"Weeks 5-8",flags:["No social smile by end of month 2","Doesn't calm when spoken to or picked up","Doesn't watch things as they move","Can't hold head up at all in tummy time"]},{month:3,name:"The Social Spark",range:"Weeks 9-13",flags:["Doesn't follow moving objects with eyes","No cooing or vocal sounds","Doesn't notice his own hands","Persistent head lag when pulled to sit"]},{month:4,name:"Grab, Roll, Laugh",range:"Weeks 14-17",flags:["Doesn't hold head steady when upright","Doesn't bring things to his mouth","Doesn't push down with legs on a hard surface","No sounds back when you talk to him"]},{month:5,name:"Opinions & Ambitions",range:"Weeks 18-21",flags:["Doesn't roll in either direction","Doesn't reach for objects","Seems very stiff or very floppy","Doesn't laugh or squeal"]},{month:6,name:"Sitting & First Bites",range:"Weeks 22-26",flags:["Doesn't try to get things within reach","Shows no affection for caregivers","Doesn't respond to sounds around him","Can't sit even with support"]},{month:7,name:"Object Permanence",range:"Weeks 27-30",flags:["Doesn't bear some weight on legs when supported","Doesn't babble consonant sounds","Doesn't transfer objects between hands","No interest in games like peekaboo"]},{month:8,name:"On the Move",range:"Weeks 31-35",flags:["Doesn't sit without help","No back-and-forth sounds or expressions","Doesn't respond to his own name","Doesn't look where you point"]},{month:9,name:"Standing Tall",range:"Weeks 36-39",flags:["Doesn't bear weight on legs with support","Doesn't sit independently","No babbling ('mama', 'baba', 'dada')","Doesn't look for objects he sees you hide"]},{month:10,name:"The Imitator",range:"Weeks 40-43",flags:["Doesn't crawl or move to get around somehow","Can't stand with support","Doesn't use gestures like waving","Loses skills he once had (always mention this one)"]},{month:11,name:"Almost Walking",range:"Weeks 44-48",flags:["Doesn't point at things","Doesn't
